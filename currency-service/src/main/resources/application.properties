spring.application.name=currency-service
server.port=8100

# Banco de Dados e Migrações
spring.datasource.url=jdbc:postgresql://localhost/db_currency
spring.datasource.username=postgres
spring.datasource.password=RexTrue2348?!
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.flyway.locations=classpath:db_migration

#Self Registration Pattern
eureka.client.service-url.default-zone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.healthcheck.enabled=true

#Health Check e Monitoramento Actuator
management.endpoints.web.exposure.include=health,info,metrics,circuit-breakers,circuit-breaker-events
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true
management.health.circuitbreakers.enabled=true

#Informações do Endpoint /actuator/info
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=Microservice Java 2026
info.app.autor=Leonardo Manfroi Zancanaro

#Metadata no Eureka (Corrigido de gihub para github)
eureka.instance.metadata-map.github.repo=Leo981-web/microservices-java

#Resilience Patterns - TimeOut (OpenFeign para o BCBClient)
spring.cloud.openfeign.client.config.BCBClient.connect-timeout=1000
spring.cloud.openfeign.client.config.BCBClient.read-timeout=3000

#Resilience Patterns - Retry (Resilience4j para o BCBClient)
resilience4j.retry.instances.BCBClient.max-attempts=3
resilience4j.retry.instances.BCBClient.wait-duration=500ms
resilience4j.retry.instances.BCBClient.enable-exponential-backoff=true
resilience4j.retry.instances.BCBClient.exponential-backoff-multiplier=2.0
resilience4j.retry.instances.BCBClient.enable-randomized-wait=true
resilience4j.retry.instances.BCBClient.randomized-wait-factor=0.5

# Exceções do Retry para o BCBClient
resilience4j.retry.instances.BCBClient.ignore-exceptions[0]=feign.FeignException$FeignClientException
resilience4j.retry.instances.BCBClient.retry-exceptions[0]=feign.RetryableException
resilience4j.retry.instances.BCBClient.retry-exceptions[1]=java.net.SocketTimeoutException
resilience4j.retry.instances.BCBClient.retry-exceptions[2]=feign.FeignException$FeignServerException

#Cache (Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=15s

#Resilience Patterns - Circuit Breaker (Configurado e Sincronizado para o BCBClient)
spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.group.enabled=true

resilience4j.circuitbreaker.instances.BCBClient.register-health-indicator=true
resilience4j.circuitbreaker.instances.BCBClient.sliding-window-size=10
resilience4j.circuitbreaker.instances.BCBClient.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.BCBClient.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.BCBClient.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.BCBClient.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.BCBClient.automatic-transition-from-open-to-half-open-enabled=true

