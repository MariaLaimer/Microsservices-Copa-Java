spring.application.name=config-service
server.port=8888

spring.cloud.config.server.git.uri=https://github.com/Leo981-web/microservices-java.git
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.search-paths=/configs/{application}

# Self Registration Pattern
eureka.client.service-url.default-zone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.healthcheck.enabled=true

# Health Check e Monitoramento Actuator
management.endpoints.web.exposure.include=health,info,metrics,circuit-breakers,circuit-breaker-events
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true

# Informações do Endpoint /actuator/info
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=Microservice Java Copa 2026
info.app.autor=Leonardo Manfroi Zancanaro & Maria Eduarda Moura Laimer

eureka.instance.metadata-map.github.repo=MariaLaimer/Microsservices-Copa-Java

